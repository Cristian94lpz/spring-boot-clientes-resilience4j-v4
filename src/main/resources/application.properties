spring.application.name=example-clientes-v4
logging.level.root=DEBUG

api-ninja.url=https://api.api-ninjas.com
api-ninja.api-key=${API_KEY}

logging.level.com.github.tomakehurst.wiremock=DEBUG
logging.level.org.apache.hc.client5.http=WARN
logging.level.org.apache.hc.client5.http.wire=WARN
logging.level.org.springframework.test.web.client=DEBUG

# Resilience4j configuraciones
spring.cloud.circuitbreaker.resilience4j.enabled=true
spring.cloud.circuitbreaker.resilience4j.blocking.enabled=true

# Circuitbreaker
resilience4j.circuitbreaker.instances.postalCodeBreak.sliding-window-type=count_based
resilience4j.circuitbreaker.instances.postalCodeBreak.sliding-window-size=4
resilience4j.circuitbreaker.instances.postalCodeBreak.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.postalCodeBreak.minimum-number-of-calls=2
resilience4j.circuitbreaker.instances.postalCodeBreak.automatic-transition-from-open-to-half-open-enabled=false
resilience4j.circuitbreaker.instances.postalCodeBreak.wait-duration-in-open-state=3s
resilience4j.circuitbreaker.instances.postalCodeBreak.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.postalCodeBreak.slow-call-rate-threshold=100
resilience4j.circuitbreaker.instances.postalCodeBreak.slow-call-duration-threshold=10000
resilience4j.circuitbreaker.instances.postalCodeBreak.max-wait-duration-in-half-open-state=0
#resilience4j.circuitbreaker.instances.postalCodeBreak.recordException=empty
#resilience4j.circuitbreaker.instances.postalCodeBreak.ignoreException=empty



# Retry
resilience4j.retry.instances.postalCodeRetry.max-attempts=3
resilience4j.retry.instances.postalCodeRetry.wait-duration=1s
resilience4j.retry.instances.postalCodeRetry.failAfterMaxAttempts=false
resilience4j.retry.metrics.legacy.enabled=true
resilience4j.retry.metrics.enabled=true


# RateLimiter
resilience4j.ratelimiter.metrics.enabled=true
resilience4j.ratelimiter.instances.postalCodeRateLimiter.limit-for-period=5
resilience4j.ratelimiter.instances.postalCodeRateLimiter.limit-refresh-period=60s
resilience4j.ratelimiter.instances.postalCodeRateLimiter.timeout-duration=0s
resilience4j.ratelimiter.instances.postalCodeRateLimiter.allow-health-indicator-to-fail=true
resilience4j.ratelimiter.instances.postalCodeRateLimiter.register-health-indicator=true
resilience4j.ratelimiter.instances.postalCodeRateLimiter.subscribe-for-events=true
resilience4j.ratelimiter.instances.postalCodeRateLimiter.event-consumer-buffer-size=50

# TimeLimiter
resilience4j.timelimiter.metrics.enabled=true
resilience4j.timelimiter.instances.postalCodeTimeLimiter.timeout-duration=2s
resilience4j.timelimiter.instances.postalCodeTimeLimiter.cancel-running-future=true

# Bulkhead
resilience4j.bulkhead.metrics.enabled=true
resilience4j.bulkhead.instances.postalCodeBulkhead.max-concurrent-calls=3
resilience4j.bulkhead.instances.postalCodeBulkhead.max-wait-duration=1